---
- name: Decrypt vault-encrypted dotfiles
  hosts: localhost
  become: true
  become_user: "{{ dotfiles_user }}"
  vars:
    dotfiles_dir: "~{{ dotfiles_user }}/.dotfiles"
  tasks:
    - name: Find all files in dot-directories
      ansible.builtin.shell: |
        find {{ dotfiles_dir }} -maxdepth 1 -name '.*' -not -name '.git' -not -name '.gitignore' -not -name '.gitmodules' -type d \
          -exec find {} -type f \;
      register: dot_dir_files
      changed_when: false
      failed_when: false

    - name: Copy non-encrypted files from dot-directories
      ansible.builtin.shell: |
        rel="{{ item | regex_replace('^' + dotfiles_dir + '/', '') }}"
        dest="/home/{{ dotfiles_user }}/$rel"
        if head -1 "{{ item }}" 2>/dev/null | grep -q '^\$ANSIBLE_VAULT;'; then
          exit 0
        fi
        mkdir -p "$(dirname "$dest")"
        cp "{{ item }}" "$dest"
        chmod 600 "$dest"
        chown {{ dotfiles_user }}:{{ dotfiles_user }} "$dest"
      become: true
      become_user: "root"
      with_items: "{{ dot_dir_files.stdout_lines }}"
      when: dot_dir_files.stdout_lines | length > 0

    - name: Decrypt vault-encrypted files from dot-directories
      ansible.builtin.shell: |
        rel="{{ item | regex_replace('^' + dotfiles_dir + '/', '') }}"
        dest="/home/{{ dotfiles_user }}/$rel"
        if ! head -1 "{{ item }}" 2>/dev/null | grep -q '^\$ANSIBLE_VAULT;'; then
          exit 0
        fi
        mkdir -p "$(dirname "$dest")"
        rm -f "$dest"
        cp "{{ item }}" "$dest"
        ansible-vault decrypt "$dest" --vault-password-file="/home/{{ dotfiles_user }}/.vault.password.txt"
        chmod 600 "$dest"
        chown {{ dotfiles_user }}:{{ dotfiles_user }} "$dest"
      become: true
      become_user: "root"
      with_items: "{{ dot_dir_files.stdout_lines }}"
      when: dot_dir_files.stdout_lines | length > 0
