---
- name: Install Claude Code
  ansible.builtin.shell: "curl -fsSL {{ claude_install_url }} | bash"
  args:
    creates: "{{ claude_bin_path }}"
  become: true
  become_user: "{{ claude_user }}"

- name: Check if AWS CLI is installed
  ansible.builtin.command: bash -c "command -v aws"
  register: claude_aws_check
  changed_when: false
  failed_when: false

- name: Install AWS CLI
  ansible.builtin.shell: |
    curl -s "{{ claude_awscli_url }}" -o /tmp/awscliv2.zip
    unzip -qo /tmp/awscliv2.zip -d /tmp
    /tmp/aws/install --update
    rm -rf /tmp/awscliv2.zip /tmp/aws
  args:
    creates: /usr/local/bin/aws
  become: true
  become_user: "root"
  when: claude_aws_check.rc != 0

- name: Check if launch-claude-bedrock script exists in dotfiles
  ansible.builtin.stat:
    path: "{{ claude_dotfiles_dir }}/scripts/launch-claude-bedrock.sh"
  register: claude_bedrock_script_check

- name: Copy launch-claude-bedrock script to home
  ansible.builtin.copy:
    src: "{{ claude_dotfiles_dir }}/scripts/launch-claude-bedrock.sh"
    dest: "/home/{{ claude_user }}/launch-claude-bedrock.sh"
    mode: '0755'
    owner: "{{ claude_user }}"
    group: "{{ claude_user }}"
    remote_src: true
  become: true
  become_user: "root"
  when: claude_bedrock_script_check.stat.exists
