---
- name: Install Homebrew dependencies
  ansible.builtin.package:
    name: "{{ linuxbrew_dependencies }}"
    state: present
  become: true
  become_user: root

- name: Check if Homebrew is installed
  ansible.builtin.stat:
    path: "{{ linuxbrew_home }}/bin/brew"
  register: brew_check

- name: Download Homebrew install script
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh"
    dest: "/tmp/homebrew_install.sh"
    mode: '0755'
  when: not brew_check.stat.exists

- name: Install Homebrew
  ansible.builtin.shell: NONINTERACTIVE=1 bash /tmp/homebrew_install.sh
  become: true
  become_user: "{{ linuxbrew_user }}"
  when: not brew_check.stat.exists

- name: Check if zshrc exists
  ansible.builtin.stat:
    path: "~{{ linuxbrew_user }}/.zshrc"
  register: zshrc_check

- name: Check if bashrc exists
  ansible.builtin.stat:
    path: "~{{ linuxbrew_user }}/.bashrc"
  register: bashrc_check

- name: Add brew to PATH in zshrc
  ansible.builtin.lineinfile:
    path: "~{{ linuxbrew_user }}/.zshrc"
    line: 'eval "$({{ linuxbrew_home }}/bin/brew shellenv)"'
    state: present
    mode: "0644"
    owner: "{{ linuxbrew_user }}"
    group: "{{ linuxbrew_user }}"
  register: _brew_in_zshrc
  changed_when: _brew_in_zshrc.msg is defined and 'line added' in _brew_in_zshrc.msg
  when: zshrc_check.stat.exists

- name: Add brew to PATH in bashrc
  ansible.builtin.lineinfile:
    path: "~{{ linuxbrew_user }}/.bashrc"
    line: 'eval "$({{ linuxbrew_home }}/bin/brew shellenv)"'
    state: present
    mode: "0644"
    owner: "{{ linuxbrew_user }}"
    group: "{{ linuxbrew_user }}"
  register: _brew_in_bashrc
  changed_when: _brew_in_bashrc.msg is defined and 'line added' in _brew_in_bashrc.msg
  when: bashrc_check.stat.exists

- name: Clean up install script
  ansible.builtin.file:
    path: /tmp/homebrew_install.sh
    state: absent
