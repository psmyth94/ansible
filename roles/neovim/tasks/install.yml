---

- name: Ensure required build dependencies are installed
  ansible.builtin.package:
    name: "{{ neovim_dependencies }}"
    state: present
  become_user: "root"
  become: true

- name: Install curl
  ansible.builtin.package:
    name: curl
    state: present
  become_user: "root"
  become: true
  when: ansible_os_family == "Debian"

- name: Install python3-pip
  ansible.builtin.package:
    name: python3-pip
    state: present
  become_user: "root"
  become: true
  when: ansible_os_family == "Debian"

- name: Install ripgrep for debian
  ansible.builtin.package:
    name: ripgrep
    state: present
  become_user: "root"
  become: true
  when: ansible_os_family == "Debian"

- name: Install ripgrep for amazon with cargo
  ansible.builtin.command:
    cmd: cargo install ripgrep
  become_user: "root"
  become: true
  when: ansible_os_family == "Amazon"
  changed_when: false

- name: Ensure required python libraries are installed
  ansible.builtin.pip:
    name: "{{ neovim_pip_dependencies }}"
    state: present
    extra_args: --break-system-packages
  become_user: "root"
  become: true
  when: ansible_os_family == "Debian"

- name: Ensure required python libraries are installed
  ansible.builtin.pip:
    name: "{{ neovim_pip_dependencies }}"
    state: present
  become_user: "root"
  become: true
  when: ansible_os_family == "Amazon"

- name: Build Neovim from Source
  ansible.builtin.include_tasks: install_source.yml
  tags:
    - source
  when: neovim_from_source

- name: Build Neovim from Appimage
  ansible.builtin.include_tasks: install_appimage.yml
  tags:
    - appimage
  when: not neovim_from_source
