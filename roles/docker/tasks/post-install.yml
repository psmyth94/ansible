---
- name: Enable and start Docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  when:
    - ansible_service_mgr == "systemd"

- name: Create the docker group
  ansible.builtin.group:
    name: "{{ docker_group }}"
    state: present
  become: true
  become_user: "root"

- name: Add user to the docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: "{{ docker_group }}"
    append: true
  become: true
  become_user: "root"
