---
- name: Check if gh is installed
  ansible.builtin.command: bash -c "command -v gh"
  register: gh_check
  changed_when: false
  failed_when: false

- name: Set gh needs install fact
  ansible.builtin.set_fact:
    gh_needs_install: "{{ gh_check.rc != 0 or gh_force_install }}"

- name: Check if gh was installed via snap
  ansible.builtin.command: snap list gh
  register: gh_snap_check
  changed_when: false
  failed_when: false
  when: gh_needs_install

- name: Remove snap version of gh
  ansible.builtin.command: snap remove gh
  become: true
  become_user: root
  when: gh_needs_install and gh_snap_check.rc == 0

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  become_user: root
  when: gh_needs_install

- name: Download gh GPG key
  ansible.builtin.get_url:
    url: "{{ gh_repo_url }}/githubcli-archive-keyring.gpg"
    dest: "{{ gh_keyring_path }}"
    mode: '0644'
  become: true
  become_user: root
  when: gh_needs_install

- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: gh_system_arch
  changed_when: false
  when: gh_needs_install

- name: Create gh repository file
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/github-cli.list
    content: "deb [arch={{ gh_system_arch.stdout }} signed-by={{ gh_keyring_path }}] {{ gh_repo_url }} stable main"
    mode: '0644'
  become: true
  become_user: root
  when: gh_needs_install

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  become: true
  become_user: root
  when: gh_needs_install

- name: Install gh
  ansible.builtin.apt:
    name: gh
    state: latest
  become: true
  become_user: root
  when: gh_needs_install

- name: Ensure gh config directory exists
  ansible.builtin.file:
    path: "{{ gh_config_dir }}"
    state: directory
    mode: '0700'
    owner: "{{ gh_user }}"
    group: "{{ gh_user }}"
  become: true
  become_user: root

- name: Check if dotfiles gh hosts.yml exists
  ansible.builtin.stat:
    path: "{{ gh_dotfiles_dir }}/gh/.config/gh/hosts.yml"
  register: gh_dotfiles_hosts_check

- name: Deploy gh hosts.yml from dotfiles
  ansible.builtin.copy:
    src: "{{ gh_dotfiles_dir }}/gh/.config/gh/hosts.yml"
    dest: "{{ gh_config_dir }}/hosts.yml"
    mode: '0600'
    owner: "{{ gh_user }}"
    group: "{{ gh_user }}"
  become: true
  become_user: root
  when: gh_dotfiles_hosts_check.stat.exists

- name: Deploy gh config.yml from dotfiles
  ansible.builtin.copy:
    src: "{{ gh_dotfiles_dir }}/gh/.config/gh/config.yml"
    dest: "{{ gh_config_dir }}/config.yml"
    mode: '0600'
    owner: "{{ gh_user }}"
    group: "{{ gh_user }}"
    remote_src: true
  become: true
  become_user: root
  when: gh_dotfiles_hosts_check.stat.exists

- name: Check if gh is authenticated
  ansible.builtin.command: gh auth status
  become: true
  become_user: "{{ gh_user }}"
  register: gh_auth_check
  changed_when: false
  failed_when: false

- name: Check if gh copilot extension is installed
  ansible.builtin.command: gh extension list
  become: true
  become_user: "{{ gh_user }}"
  register: gh_extensions_list
  changed_when: false
  failed_when: false
  when: gh_auth_check.rc == 0

- name: Install gh copilot extension
  ansible.builtin.command: gh extension install github/gh-copilot
  become: true
  become_user: "{{ gh_user }}"
  when: gh_auth_check.rc == 0 and "'gh-copilot' not in gh_extensions_list.stdout"
